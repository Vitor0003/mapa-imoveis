<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Imóveis</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="sidebar">

            <h2>🏢 Gestão Imobiliária</h2>

            <input type="text" id="nome" placeholder="Nome do imóvel">

            <input type="text" id="cidade" placeholder="Cidade">

            <input type="number" id="lat" step="any" placeholder="Latitude">

            <input type="number" id="lng" step="any" placeholder="Longitude">

            <select id="status">
                <option value="true">Disponível</option>
                <option value="false">Indisponível</option>
            </select>

            <button onclick="adicionarImovel()">
                Adicionar Imóvel
            </button>

            <hr>

            <h3>Imóveis Cadastrados</h3>

            <div id="listaImoveis"></div>

        </div>

        <div id="map"></div>

    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>

</body>

</html>
